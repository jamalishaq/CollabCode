networks:
  collabcode:
    driver: bridge

services:

  # ── Auth Service ────────────────────────────────────────────────
  auth-service:
    build:
      context: .
      dockerfile: infrastructure/docker/auth-service.Dockerfile
    container_name: collabcode-auth-service
    networks:
      - collabcode
    env_file:
      - ./apps/auth-service/.env
    environment:
      PORT: "3001"
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Workspace Service ───────────────────────────────────────────
  workspace-service:
    build:
      context: .
      dockerfile: infrastructure/docker/workspace-service.Dockerfile
    container_name: collabcode-workspace-service
    networks:
      - collabcode
    env_file:
      - ./apps/workspace-service/.env
    environment:
      PORT: "3002"
    ports:
      - "3002:3002"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3002/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── File Service ────────────────────────────────────────────────
  file-service:
    build:
      context: .
      dockerfile: infrastructure/docker/file-service.Dockerfile
    container_name: collabcode-file-service
    networks:
      - collabcode
    env_file:
      - ./apps/file-service/.env
    environment:
      PORT: "3003"
    ports:
      - "3003:3003"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3003/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Notification Service ────────────────────────────────────────
  notification-service:
    build:
      context: .
      dockerfile: infrastructure/docker/notification-service.Dockerfile
    container_name: collabcode-notification-service
    networks:
      - collabcode
    env_file:
      - ./apps/notification-service/.env
    environment:
      PORT: "3004"
    ports:
      - "3004:3004"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3004/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Collaboration Service (Go) ──────────────────────────────────
  collaboration-service:
    build:
      context: .
      dockerfile: infrastructure/docker/collaboration-service.Dockerfile
    container_name: collabcode-collaboration-service
    networks:
      - collabcode
    env_file:
      - ./apps/collaboration-service/.env
    environment:
      PORT: "4000"
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Execution Service (Go) ──────────────────────────────────────
  # CRITICAL: Requires access to the host Docker socket to spawn
  # sandboxed containers for user code execution.
  # The socket is mounted read-write — this is intentional and required.
  execution-service:
    build:
      context: .
      dockerfile: infrastructure/docker/execution-service.Dockerfile
    container_name: collabcode-execution-service
    networks:
      - collabcode
    env_file:
      - ./apps/execution-service/.env
    environment:
      PORT: "4001"
    ports:
      - "4001:4001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── API Gateway ─────────────────────────────────────────────────
  # Deployed LAST — depends on all downstream services being healthy.
  # Uses internal Docker network hostnames for service-to-service calls.
  api-gateway:
    build:
      context: .
      dockerfile: infrastructure/docker/api-gateway.Dockerfile
    container_name: collabcode-api-gateway
    networks:
      - collabcode
    env_file:
      - ./apps/api-gateway/.env
    environment:
      PORT: "3000"
      # Override service URLs to use Docker internal hostnames
      # These override whatever is in the .env file for local dev
      AUTH_SERVICE_URL: http://auth-service:3001
      WORKSPACE_SERVICE_URL: http://workspace-service:3002
      FILE_SERVICE_URL: http://file-service:3003
      NOTIFICATION_SERVICE_URL: http://notification-service:3004
      COLLABORATION_SERVICE_URL: ws://collaboration-service:4000
      EXECUTION_SERVICE_URL: http://execution-service:4001
    ports:
      - "3000:3000"
    depends_on:
      auth-service:
        condition: service_healthy
      workspace-service:
        condition: service_healthy
      file-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      collaboration-service:
        condition: service_healthy
      execution-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Frontend ────────────────────────────────────────────────────
  # VITE_ variables must be passed as build args — they are embedded
  # into the JS bundle at build time, not injected at runtime.
  # Port mapping: host 5173 → container 80 (Nginx listens on PORT=80)
  frontend:
    build:
      context: .
      dockerfile: infrastructure/docker/frontend.Dockerfile
      args:
        VITE_API_URL: http://127.0.0.1:3000
        VITE_WS_URL: ws://127.0.0.1:4000
    container_name: collabcode-frontend
    networks:
      - collabcode
    environment:
      PORT: "80"
    ports:
      - "5173:80"
    depends_on:
      api-gateway:
        condition: service_healthy
      collaboration-service:
        condition: service_healthy