name: CD — Production

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/collabcode

jobs:

  # ── Integration Tests ─────────────────────────────────────────────
  # Runs against ephemeral GitHub Actions service containers.
  # NEVER hits production infrastructure (Neon, Upstash, QStash).
  # Redis and Postgres spin up as containers for the duration of
  # this job only and are destroyed when the job completes.
  # QStash events are mocked — no real message queue needed here.
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: collabcode_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9.0.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run Prisma migrations on test DB
        run: pnpm turbo run db:migrate
        env:
          DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/collabcode_test

      - name: Run integration tests
        run: pnpm turbo run test:integration
        env:
          DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/collabcode_test?sslmode=disable
          REDIS_URL: redis://localhost:6379
          # QStash is mocked in integration tests — no real credentials needed
          QSTASH_MOCK: "true"
          NODE_ENV: test

      - uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: '**/test-results/'
          retention-days: 7

  # ── Go Integration Tests ──────────────────────────────────────────
  # Runs integration tests for collaboration-service and
  # execution-service against ephemeral Redis container.
  integration-tests-go:
    name: Integration Tests (Go) — ${{ matrix.service }}
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-retries 5
    strategy:
      matrix:
        service: [collaboration-service, execution-service]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: apps/${{ matrix.service }}/go.sum

      - name: Run integration tests — ${{ matrix.service }}
        run: |
          cd apps/${{ matrix.service }}
          go test ./... -tags integration -race -coverprofile=coverage.out
        env:
          REDIS_URL: redis://localhost:6379

  # ── Build & Push Docker Images to GHCR ───────────────────────────
  # Runs in parallel for all services via matrix strategy.
  # Images are tagged with both 'latest' and the exact git SHA.
  # Git SHA tagging ensures every deployed version is traceable
  # and instantly rollback-able via Render's image tag selector.
  # Docker layer caching via GitHub Actions cache speeds up builds
  # significantly — only changed layers are rebuilt.
  build-push:
    name: Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [integration-tests, integration-tests-go]
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - api-gateway
          - auth-service
          - workspace-service
          - file-service
          - notification-service
          - collaboration-service
          - execution-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push — ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/${{ matrix.service }}.Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max
          build-args: |
            BUILD_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}

  # ── Deploy Frontend to Vercel ─────────────────────────────────────
  # Vercel deploys the frontend independently of backend services.
  # It does not need to wait for Docker builds — Vercel builds
  # directly from source, not from our Docker images.
  # Runs in parallel with build-push to save pipeline time.
  deploy-frontend:
    name: Deploy Frontend — Vercel
    runs-on: ubuntu-latest
    needs: [integration-tests]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9.0.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Deploy to Vercel production
        run: |
          pnpm dlx vercel \
            --token ${{ secrets.VERCEL_TOKEN }} \
            --prod \
            --yes \
            --cwd apps/frontend
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ── Manual Approval Gate ──────────────────────────────────────────
  # Blocks backend deployment until a required reviewer approves.
  # Configured in GitHub repo Settings → Environments → production.
  # Add required reviewers in the environment protection rules.
  # The approval window is 7 days — after that the deploy expires.
  # Frontend (Vercel) deploys without approval — it is independently
  # rollback-able via Vercel's instant rollback feature.
  await-approval:
    name: Awaiting Production Approval
    runs-on: ubuntu-latest
    needs: build-push
    environment: production
    steps:
      - name: Approval granted — proceeding to deploy
        run: |
          echo "Approved by: ${{ github.actor }}"
          echo "Deploying commit: ${{ github.sha }}"
          echo "Commit message: ${{ github.event.head_commit.message }}"

  # ── Deploy Backend Services to Render ────────────────────────────
  # Triggers Render deploy hooks for each service after approval.
  # Each service has its own deploy hook URL stored as a GitHub secret.
  # Render pulls the new Docker image from GHCR and deploys it.
  # Services are deployed sequentially in dependency order:
  #   1. auth-service (no service dependencies)
  #   2. workspace-service, file-service, notification-service (depend on auth)
  #   3. collaboration-service, execution-service (depend on file-service)
  #   4. api-gateway last (depends on all services being healthy)
  deploy-backend:
    name: Deploy Backend — Render
    runs-on: ubuntu-latest
    needs: await-approval
    steps:
      - name: Deploy auth-service
        run: |
          curl -fsSL \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_AUTH_SERVICE }}&imgURL=${{ env.IMAGE_PREFIX }}/auth-service:${{ github.sha }}"

      - name: Wait for auth-service to be healthy
        run: |
          echo "Waiting for auth-service..."
          for i in {1..24}; do
            STATUS=$(curl -sf ${{ secrets.PRODUCTION_URL_AUTH }}/health | jq -r '.status' || echo "down")
            if [ "$STATUS" = "ok" ]; then
              echo "auth-service is healthy"
              break
            fi
            echo "Attempt $i/24 — not ready yet, retrying in 10s..."
            sleep 10
          done
          if [ "$STATUS" != "ok" ]; then
            echo "auth-service failed to become healthy after 4 minutes"
            exit 1
          fi

      - name: Deploy workspace-service, file-service, notification-service
        run: |
          curl -fsSL -X POST \
            "${{ secrets.RENDER_DEPLOY_HOOK_WORKSPACE_SERVICE }}&imgURL=${{ env.IMAGE_PREFIX }}/workspace-service:${{ github.sha }}"
          curl -fsSL -X POST \
            "${{ secrets.RENDER_DEPLOY_HOOK_FILE_SERVICE }}&imgURL=${{ env.IMAGE_PREFIX }}/file-service:${{ github.sha }}"
          curl -fsSL -X POST \
            "${{ secrets.RENDER_DEPLOY_HOOK_NOTIFICATION_SERVICE }}&imgURL=${{ env.IMAGE_PREFIX }}/notification-service:${{ github.sha }}"

      - name: Wait for mid-tier services to be healthy
        run: |
          services=(
            "${{ secrets.PRODUCTION_URL_WORKSPACE }}/health"
            "${{ secrets.PRODUCTION_URL_FILE }}/health"
            "${{ secrets.PRODUCTION_URL_NOTIFICATION }}/health"
          )
          for url in "${services[@]}"; do
            for i in {1..24}; do
              STATUS=$(curl -sf "$url" | jq -r '.status' || echo "down")
              if [ "$STATUS" = "ok" ]; then
                echo "$url is healthy"
                break
              fi
              echo "Waiting for $url — attempt $i/24..."
              sleep 10
            done
            if [ "$STATUS" != "ok" ]; then
              echo "$url failed to become healthy"
              exit 1
            fi
          done

      - name: Deploy collaboration-service and execution-service
        run: |
          curl -fsSL -X POST \
            "${{ secrets.RENDER_DEPLOY_HOOK_COLLABORATION_SERVICE }}&imgURL=${{ env.IMAGE_PREFIX }}/collaboration-service:${{ github.sha }}"
          curl -fsSL -X POST \
            "${{ secrets.RENDER_DEPLOY_HOOK_EXECUTION_SERVICE }}&imgURL=${{ env.IMAGE_PREFIX }}/execution-service:${{ github.sha }}"

      - name: Wait for collaboration and execution services
        run: |
          services=(
            "${{ secrets.PRODUCTION_URL_COLLABORATION }}/health"
            "${{ secrets.PRODUCTION_URL_EXECUTION }}/health"
          )
          for url in "${services[@]}"; do
            for i in {1..24}; do
              STATUS=$(curl -sf "$url" | jq -r '.status' || echo "down")
              if [ "$STATUS" = "ok" ]; then
                echo "$url is healthy"
                break
              fi
              sleep 10
            done
          done

      - name: Deploy api-gateway last
        run: |
          curl -fsSL -X POST \
            "${{ secrets.RENDER_DEPLOY_HOOK_API_GATEWAY }}&imgURL=${{ env.IMAGE_PREFIX }}/api-gateway:${{ github.sha }}"

      - name: Wait for api-gateway to be healthy
        run: |
          for i in {1..24}; do
            STATUS=$(curl -sf ${{ secrets.PRODUCTION_URL_GATEWAY }}/health | jq -r '.status' || echo "down")
            if [ "$STATUS" = "ok" ]; then
              echo "api-gateway is healthy — all services deployed"
              break
            fi
            sleep 10
          done
          if [ "$STATUS" != "ok" ]; then
            echo "api-gateway failed to become healthy"
            exit 1
          fi

  # ── Smoke Tests ───────────────────────────────────────────────────
  # Runs critical path tests against production after all services
  # are confirmed healthy. Tests cover the most important user flows:
  #   - Auth: register, login, refresh token
  #   - Workspace: create workspace, create project
  #   - File: create file, acquire lock, release lock
  #   - Execution: run a Hello World in each supported language
  # On failure: Render rollback API is called for every backend service.
  # Frontend rollback is handled separately via Vercel instant rollback.
  smoke-tests:
    name: Smoke Tests — Production
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9.0.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run smoke tests
        id: smoke
        run: pnpm --filter frontend test:smoke
        env:
          BASE_URL: ${{ secrets.PRODUCTION_URL_GATEWAY }}
          SMOKE_TEST_USER_EMAIL: ${{ secrets.SMOKE_TEST_USER_EMAIL }}
          SMOKE_TEST_USER_PASSWORD: ${{ secrets.SMOKE_TEST_USER_PASSWORD }}

      - name: Rollback all backend services on smoke test failure
        if: failure() && steps.smoke.outcome == 'failure'
        run: |
          echo "Smoke tests failed — initiating rollback for all services"
          services=(
            "${{ secrets.RENDER_SERVICE_ID_API_GATEWAY }}"
            "${{ secrets.RENDER_SERVICE_ID_AUTH_SERVICE }}"
            "${{ secrets.RENDER_SERVICE_ID_WORKSPACE_SERVICE }}"
            "${{ secrets.RENDER_SERVICE_ID_FILE_SERVICE }}"
            "${{ secrets.RENDER_SERVICE_ID_NOTIFICATION_SERVICE }}"
            "${{ secrets.RENDER_SERVICE_ID_COLLABORATION_SERVICE }}"
            "${{ secrets.RENDER_SERVICE_ID_EXECUTION_SERVICE }}"
          )
          for service_id in "${services[@]}"; do
            curl -fsSL \
              -X POST \
              -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
              "https://api.render.com/v1/services/$service_id/rollback"
            echo "Rollback triggered for service: $service_id"
          done

      - name: Rollback frontend on smoke test failure
        if: failure() && steps.smoke.outcome == 'failure'
        run: |
          echo "Rolling back Vercel frontend to previous deployment"
          pnpm dlx vercel \
            --token ${{ secrets.VERCEL_TOKEN }} \
            rollback \
            --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ── Notify on Completion ──────────────────────────────────────────
  # Posts a deployment summary to Slack (or any webhook) on both
  # success and failure so the team is always informed.
  # notify:
  #   name: Notify Team
  #   runs-on: ubuntu-latest
  #   needs: smoke-tests
  #   if: always()
  #   steps:
  #     - name: Notify on success
  #       if: needs.smoke-tests.result == 'success'
  #       run: |
  #         curl -fsSL -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
  #           -H 'Content-Type: application/json' \
  #           -d '{
  #             "text": "✅ *CollabCode deployed to production successfully*",
  #             "attachments": [{
  #               "color": "good",
  #               "fields": [
  #                 { "title": "Commit", "value": "${{ github.sha }}", "short": true },
  #                 { "title": "Author", "value": "${{ github.actor }}", "short": true },
  #                 { "title": "Message", "value": "${{ github.event.head_commit.message }}", "short": false }
  #               ]
  #             }]
  #           }'

  #     - name: Notify on failure
  #       if: needs.smoke-tests.result == 'failure'
  #       run: |
  #         curl -fsSL -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
  #           -H 'Content-Type: application/json' \
  #           -d '{
  #             "text": "🚨 *CollabCode production deployment FAILED — rollback initiated*",
  #             "attachments": [{
