# .github/workflows/keep-alive.yml

name: Keep Services Alive

on:
  schedule:
    - cron: '*/10 * * * *'  # Every 10 minutes

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping all services
        run: |
          services=(
            "https://collabcode-auth.onrender.com/health"
            "https://collabcode-workspace.onrender.com/health"
            "https://collabcode-file.onrender.com/health"
            "https://collabcode-notification.onrender.com/health"
            "https://collabcode-collaboration.onrender.com/health"
            "https://collabcode-execution.onrender.com/health"
          )
          for url in "${services[@]}"; do
            curl -sf "$url" || echo "Warning: $url did not respond"
          done