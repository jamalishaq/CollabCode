apiVersion: apps/v1
kind: Deployment
metadata:
  name: file-service
  namespace: collabcode
spec:
  replicas: 1
  selector:
    matchLabels:
      app: file-service
  template:
    metadata:
      labels:
        app: file-service
    spec:
      containers:
        - name: file-service
          image: collabcode/file-service:latest
          ports:
            - containerPort: 3003
